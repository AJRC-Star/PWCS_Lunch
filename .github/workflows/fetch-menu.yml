name: Fetch Menu Data

on:
  schedule:
    # Run every Saturday at 10:00 UTC
    # This is 6:00 AM ET during daylight time and 5:00 AM ET during standard time.
    - cron: '0 10 * * 6'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  fetch-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'

      - name: Fetch menu data
        run: node scripts/fetch-menu.js

      - name: Check if data changed
        id: check-changes
        run: |
          if git diff --quiet public/menu-data.json; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Data has changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/menu-data.json
          FETCH_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Update menu data via GitHub Actions - $FETCH_TIME"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Menu data fetch failed!"
          exit 1
