name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate artifact
        run: npm run validate:artifact

      - name: Summarize artifact
        run: npx tsx scripts/summarize-menu-artifact.ts >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        if: github.event_name == 'pull_request'
        run: npm run build
