<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="url(#bgGrad)" rx="45"/>

  <!-- Hamburger centered and larger -->
  <g transform="translate(25, 35)">
    <!-- Top Bun with shading -->
    <ellipse cx="70" cy="25" rx="50" ry="22" fill="#d4a574" filter="url(#shadow)"/>
    <ellipse cx="70" cy="22" rx="50" ry="20" fill="#e8c896"/>
    <ellipse cx="70" cy="20" rx="48" ry="18" fill="#f0d9b5"/>

    <!-- Sesame seeds - larger and more visible -->
    <circle cx="35" cy="16" r="3.5" fill="#f5e6c8"/>
    <circle cx="50" cy="12" r="3.5" fill="#f5e6c8"/>
    <circle cx="65" cy="10" r="3.5" fill="#f5e6c8"/>
    <circle cx="80" cy="11" r="3.5" fill="#f5e6c8"/>
    <circle cx="95" cy="15" r="3.5" fill="#f5e6c8"/>
    <circle cx="105" cy="21" r="3.5" fill="#f5e6c8"/>

    <!-- Lettuce layer -->
    <ellipse cx="70" cy="48" rx="52" ry="8" fill="#7cb342"/>
    <ellipse cx="70" cy="46" rx="52" ry="6" fill="#9ccc65"/>

    <!-- Tomato -->
    <ellipse cx="70" cy="60" rx="50" ry="7" fill="#e74c3c"/>
    <ellipse cx="70" cy="58" rx="50" ry="5" fill="#ff6b6b"/>

    <!-- Cheese layer - melted look -->
    <ellipse cx="70" cy="72" rx="51" ry="8" fill="#f7b731"/>
    <ellipse cx="70" cy="70" rx="51" ry="6" fill="#ffd700"/>

    <!-- Beef Patty - thick and prominent -->
    <ellipse cx="70" cy="90" rx="52" ry="12" fill="#6b4423" filter="url(#shadow)"/>
    <ellipse cx="70" cy="87" rx="52" ry="10" fill="#8b5a2b"/>
    <ellipse cx="70" cy="84" rx="50" ry="8" fill="#a0673d"/>

    <!-- Patty texture/grill marks -->
    <line x1="35" y1="84" x2="105" y2="84" stroke="#6b4423" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="87" x2="105" y2="87" stroke="#6b4423" stroke-width="1" opacity="0.5"/>

    <!-- Bottom Bun -->
    <ellipse cx="70" cy="115" rx="52" ry="22" fill="#d4a574" filter="url(#shadow)"/>
    <ellipse cx="70" cy="112" rx="52" ry="20" fill="#e8c896"/>
    <ellipse cx="70" cy="110" rx="50" ry="18" fill="#f0d9b5"/>
  </g>
</svg>
