name: Check Menu Freshness

on:
  schedule:
    # Verify the weekly Saturday refresh after the two-hour freshness grace.
    - cron: '30 12 * * 6'
    # Keep a weekday correctness signal visible while students are using it.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MENU_ARTIFACT_URL: https://ajrc-star.github.io/PWCS_Lunch/menu-data.json

jobs:
  check-menu-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production artifact freshness
        run: npm run check:artifact-freshness
