name: Fetch Menu Data

on:
  schedule:
    # Run on school days (Mon–Fri) at 10:00 UTC (6 AM ET) and 14:00 UTC (10 AM ET)
    # so the pre-built snapshot is refreshed at the start of each school day and
    # again mid-morning once the cafeteria has typically posted the day's menu.
    - cron: '0 10,14 * * 1-5'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  fetch-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch menu data
        run: npx tsx scripts/fetch-menu.ts

      - name: Check if data changed
        id: check-changes
        run: |
          if git diff --quiet public/menu-data.json; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Data has changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/menu-data.json
          FETCH_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Update menu data via GitHub Actions - $FETCH_TIME"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Menu data fetch failed!"
          exit 1
