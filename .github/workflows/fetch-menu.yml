name: Fetch Menu Data

on:
  schedule:
    # Run once per week on Saturday at 10:00 UTC so the next week's menu
    # snapshot is refreshed with minimal churn. Manual dispatch remains
    # available for ad-hoc updates if MealViewer changes midweek.
    - cron: '0 10 * * 6'
  # Also allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch menu data
        run: npx tsx scripts/fetch-menu.ts

      - name: Validate menu artifact
        run: npm run validate:artifact

      - name: Summarize menu artifact
        run: npx tsx scripts/summarize-menu-artifact.ts >> "$GITHUB_STEP_SUMMARY"

      - name: Check if data changed
        id: check-changes
        run: |
          if git diff --quiet public/menu-data.json; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Data has changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/menu-data.json
          FETCH_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Update menu data via GitHub Actions - $FETCH_TIME"
          git pull --rebase origin main
          git push

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FETCH_TIME=$(date -u +'%Y-%m-%d %H:%M UTC')
          gh issue create \
            --title "Menu data fetch failed — ${FETCH_TIME}" \
            --body "The scheduled menu fetch workflow failed at ${FETCH_TIME}. Students may see stale data until this is resolved. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
          || echo "⚠ Could not create issue; see workflow logs for failure details."
