<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bgGrad)" rx="45"/>

  <!-- Hamburger -->
  <g transform="translate(30, 50)">
    <!-- Top Bun -->
    <path d="M 20 15 Q 10 15 10 25 L 10 28 Q 10 32 14 32 L 116 32 Q 120 32 120 28 L 120 25 Q 120 15 110 15 Q 100 8 60 8 Q 20 8 20 15 Z" fill="#c9912f" />
    <path d="M 20 15 Q 10 15 10 25 L 10 28 Q 10 32 14 32 L 116 32 Q 120 32 120 28 L 120 25 Q 120 15 110 15 Q 100 8 60 8 Q 20 8 20 15 Z" fill="#d4a850" opacity="0.6" />
    <!-- Sesame seeds -->
    <circle cx="25" cy="18" r="2" fill="#f5deb3"/>
    <circle cx="40" cy="16" r="2" fill="#f5deb3"/>
    <circle cx="55" cy="15" r="2" fill="#f5deb3"/>
    <circle cx="70" cy="16" r="2" fill="#f5deb3"/>
    <circle cx="85" cy="18" r="2" fill="#f5deb3"/>
    <circle cx="100" cy="20" r="2" fill="#f5deb3"/>

    <!-- Lettuce -->
    <ellipse cx="60" cy="40" rx="55" ry="6" fill="#65a30d"/>

    <!-- Cheese -->
    <rect x="15" y="48" width="90" height="8" fill="#fbbf24" rx="2"/>

    <!-- Patty -->
    <ellipse cx="60" cy="62" rx="54" ry="10" fill="#8b4513"/>
    <ellipse cx="60" cy="60" rx="54" ry="8" fill="#a0522d"/>

    <!-- Bottom Bun -->
    <path d="M 20 73 Q 10 73 10 80 L 10 83 Q 10 88 14 90 L 116 90 Q 120 88 120 83 L 120 80 Q 120 73 110 73 Q 100 80 60 80 Q 20 80 20 73 Z" fill="#c9912f" />
    <path d="M 20 73 Q 10 73 10 80 L 10 83 Q 10 88 14 90 L 116 90 Q 120 88 120 83 L 120 80 Q 120 73 110 73 Q 100 80 60 80 Q 20 80 20 73 Z" fill="#8b6914" opacity="0.4" />
  </g>
</svg>
