name: Check Menu Freshness

on:
  schedule:
    # Verify the weekly Saturday refresh — run at 16:00 UTC to give the
    # 10:00 UTC fetch workflow a full 6-hour window to complete and for
    # GitHub Pages to finish deploying before we check freshness.
    - cron: '0 16 * * 6'
    # Keep a weekday correctness signal visible while students are using it.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MENU_ARTIFACT_URL: https://ajrc-star.github.io/PWCS_Lunch/menu-data.json

jobs:
  check-menu-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production artifact freshness
        run: npm run check:artifact-freshness

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHECK_TIME=$(date -u +'%Y-%m-%d %H:%M UTC')
          gh issue create \
            --title "Production menu freshness check failed — ${CHECK_TIME}" \
            --body "The production menu freshness check failed at ${CHECK_TIME}. Students may see stale menu data until this is resolved. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
          || echo "Could not create issue; see workflow logs for failure details."
